<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Choir Song Selector</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #fff; color: #111; min-height: 100vh; }
  header { background: #000; padding: 0 2rem; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .logo { font-family: Georgia, serif; font-size: 1.1rem; color: #fff; display: flex; align-items: center; gap: 0.5rem; }
  .header-status { font-size: 0.75rem; color: #aaa; display: flex; align-items: center; gap: 0.4rem; font-family: Arial, sans-serif; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #888; }
  .status-dot.loading { background: #fff; animation: pulse 1s infinite; }
  .status-dot.ready { background: #4caf50; }
  .status-dot.error { background: #cc0000; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  .section-title { font-family: Arial, sans-serif; font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: #666; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.8rem; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: #ccc; }
  .card { background: #f9f9f9; border: 1px solid #ccc; border-radius: 4px; padding: 1.2rem; margin-bottom: 1.2rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
  .field label { display: block; font-family: Arial, sans-serif; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: #666; margin-bottom: 0.3rem; }
  .field input { width: 100%; background: #fff; border: 1px solid #ccc; border-radius: 3px; padding: 0.6rem 0.8rem; color: #111; font-family: Arial, sans-serif; font-size: 0.9rem; outline: none; }
  .field input:focus { border-color: #000; }
  .field input.error-field { border-color: #cc0000; }
  .search-wrap { position: relative; margin-bottom: 0.8rem; }
  .search-wrap input { width: 100%; background: #fff; border: 1px solid #ccc; border-radius: 3px; padding: 0.65rem 1rem 0.65rem 2.5rem; color: #111; font-family: Arial, sans-serif; font-size: 0.9rem; outline: none; }
  .search-wrap input:focus { border-color: #000; }
  .search-icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: #666; font-size: 0.9rem; pointer-events: none; }
  .search-toggle { display: flex; gap: 0.4rem; margin-top: 0.4rem; }
  .toggle-btn { font-family: Arial, sans-serif; font-size: 0.72rem; padding: 0.25rem 0.65rem; border-radius: 2px; border: 1px solid #ccc; background: #fff; color: #666; cursor: pointer; }
  .toggle-btn.active { background: #000; border-color: #000; color: #fff; }
  .search-results { position: absolute; top: calc(100% + 2px); left: 0; right: 0; background: #fff; border: 1px solid #000; border-radius: 3px; max-height: 260px; overflow-y: auto; z-index: 200; display: none; }
  .search-results.visible { display: block; }
  .search-result-item { padding: 0.55rem 0.9rem; cursor: pointer; border-bottom: 1px solid #eee; font-family: Arial, sans-serif; }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: #f5f5f5; }
  .result-title { font-size: 0.88rem; color: #111; font-weight: bold; }
  .result-snippet { font-size: 0.74rem; color: #666; margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  mark { background: #000; color: #fff; padding: 0 2px; }
  .song-slot { background: #fff; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 1rem; overflow: hidden; }
  .slot-header { display: flex; align-items: center; padding: 0.75rem 1rem; background: #f5f5f5; border-bottom: 1px solid #ccc; gap: 0.7rem; }
  .slot-number { font-family: Arial, sans-serif; font-size: 0.72rem; font-weight: bold; color: #666; min-width: 50px; text-transform: uppercase; }
  .slot-select { flex: 1; background: #fff; border: 1px solid #ccc; border-radius: 3px; padding: 0.5rem 0.7rem; color: #111; font-family: Arial, sans-serif; font-size: 0.88rem; outline: none; cursor: pointer; }
  .slot-select:focus { border-color: #000; }
  .remove-btn { background: #fff; border: 1px solid #ccc; color: #666; border-radius: 3px; width: 28px; height: 28px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; }
  .remove-btn:hover { border-color: #cc0000; color: #cc0000; }
  .lyrics-area { display: none; padding: 1rem; }
  .lyrics-area.visible { display: block; }
  .lyrics-label { font-family: Arial, sans-serif; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: #666; margin-bottom: 0.4rem; display: flex; justify-content: space-between; }
  .edit-hint { font-style: italic; }
  .lyrics-text { width: 100%; background: #fff; border: 1px solid #ccc; border-radius: 3px; padding: 0.8rem; color: #111; font-family: Georgia, serif; font-size: 0.92rem; line-height: 1.8; min-height: 140px; resize: vertical; outline: none; }
  .lyrics-text:focus { border-color: #000; }
  .btn { font-family: Arial, sans-serif; font-size: 0.82rem; font-weight: bold; padding: 0.6rem 1.2rem; border-radius: 3px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem; }
  .btn-ghost { background: #fff; border: 1px solid #ccc; color: #111; }
  .btn-ghost:hover { border-color: #000; background: #f5f5f5; }
  .btn-black { background: #000; color: #fff; border: 1px solid #000; }
  .btn-black:hover { background: #333; }
  .btn-black:disabled { opacity: 0.4; cursor: not-allowed; }
  .actions-row { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: none; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border: 2px solid #000; border-radius: 4px; padding: 1.8rem; width: 100%; max-width: 500px; }
  .modal-title { font-family: Georgia, serif; font-size: 1.1rem; margin-bottom: 1.1rem; font-weight: bold; }
  .modal-field { margin-bottom: 0.9rem; }
  .modal-field label { display: block; font-family: Arial, sans-serif; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: #666; margin-bottom: 0.3rem; }
  .modal-field input, .modal-field textarea { width: 100%; background: #fff; border: 1px solid #ccc; border-radius: 3px; padding: 0.6rem 0.8rem; color: #111; font-family: Arial, sans-serif; font-size: 0.9rem; outline: none; }
  .modal-field input:focus, .modal-field textarea:focus { border-color: #000; }
  .modal-field textarea { min-height: 140px; resize: vertical; line-height: 1.7; font-family: Georgia, serif; }
  .modal-actions { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1rem; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: #000; border-radius: 3px; padding: 0.65rem 1.3rem; font-family: Arial, sans-serif; font-size: 0.85rem; color: #fff; z-index: 600; transition: transform 0.3s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error-toast { background: #cc0000; }
  .skeleton { background: linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 3px; height: 34px; margin-bottom: 0.5rem; }
  @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }
  .divider { height: 1px; background: #ccc; margin: 1.2rem 0; }
  .error-msg { background: #fff5f5; border: 1px solid #ffcccc; border-radius: 3px; padding: 0.9rem; color: #cc0000; font-family: Arial, sans-serif; font-size: 0.85rem; line-height: 1.6; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #f0f0f0; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">🎵 Choir Song Selector</div>
  <div class="header-status">
    <div class="status-dot loading" id="statusDot"></div>
    <span id="statusText">Loading songs...</span>
  </div>
</header>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="addSongModal">
  <div class="modal">
    <div class="modal-title">Add New Song</div>
    <div class="modal-field">
      <label>Song Title *</label>
      <input type="text" id="newSongTitle" placeholder="Enter song title...">
    </div>
    <div class="modal-field">
      <label>Lyrics *</label>
      <textarea id="newSongLyrics" placeholder="Paste lyrics here..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddSongModal()">Cancel</button>
      <button class="btn btn-black" id="saveNewSongBtn" onclick="saveNewSong()">Save Song</button>
    </div>
  </div>
</div>

<main>
  <div class="section-title">Member Information</div>
  <div class="card">
    <div class="form-row">
      <div class="field">
        <label>Your Name *</label>
        <input type="text" id="memberName" placeholder="First and Last Name">
      </div>
      <div class="field">
        <label>Sunday Date *</label>
        <input type="date" id="sundayDate">
      </div>
    </div>
  </div>

  <div class="section-title">Search Songs</div>
  <div style="position:relative">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by title or lyrics..." autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="search-toggle">
      <button class="toggle-btn active" id="searchTitleBtn" onclick="setSearchMode('title')">By Title</button>
      <button class="toggle-btn" id="searchLyricBtn" onclick="setSearchMode('lyric')">By Lyric</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section-title">Selected Songs</div>
  <div id="slotsContainer"></div>

  <div class="actions-row">
    <button class="btn btn-ghost" onclick="addSongSlot()">+ Add Another Song</button>
    <button class="btn btn-ghost" onclick="openAddSongModal()">+ Add New Song to Library</button>
  </div>

  <div class="divider"></div>

  <div style="display:flex; justify-content:flex-end;">
    <button class="btn btn-black" id="submitBtn" onclick="submitSelections()" style="font-size:0.95rem; padding:0.85rem 2rem;">
      Submit Song Selections
    </button>
  </div>
</main>

<script>
const SHEET_ID        = '111kgT6cmIt7JM1pjhl0rMOi1YDNMOI4DwasE2idpkAE';
const SONGS_TAB       = 'Songs';
const SELECTIONS_TAB  = 'Selections';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKsDqN01aAzuWgSqw7anxgPXbEREM38EFoXDU_hfXAcz6Rub--UMJ4eu67E-ulyddIzw/exec';
const SHEET_URL       = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=`;

let allSongs      = [];
let cachedOptions = '';
let slotCount     = 0;
let searchMode    = 'title';

document.addEventListener('DOMContentLoaded', () => {
  setNextSunday();
  loadSongs();
  const si = document.getElementById('searchInput');
  si.addEventListener('input', debounce(handleSearch, 200));
  si.addEventListener('blur', () => setTimeout(() => document.getElementById('searchResults').classList.remove('visible'), 200));
  si.addEventListener('focus', () => { if (si.value.trim().length >= 2) handleSearch(); });
});

function setNextSunday() {
  const today = new Date();
  const days  = today.getDay() === 0 ? 7 : 7 - today.getDay();
  const next  = new Date(today);
  next.setDate(today.getDate() + days);
  document.getElementById('sundayDate').value =
    `${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}-${String(next.getDate()).padStart(2,'0')}`;
}

async function loadSongs() {
  setStatus('loading', 'Loading songs...');
  const container = document.getElementById('slotsContainer');
  container.innerHTML = '<div class="card"><div class="skeleton"></div><div class="skeleton" style="width:70%"></div></div>';
  try {
    const res  = await fetch(SHEET_URL + encodeURIComponent(SONGS_TAB));
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const json = JSON.parse(text.replace(/^.*?({.*}).*$/s, '$1'));
    allSongs = json.table.rows
      .filter(r => r.c && r.c[0] && r.c[0].v)
      .map(r => ({ title: String(r.c[0].v).trim(), lyrics: r.c[1] ? String(r.c[1].v).trim() : '' }))
      .sort((a, b) => a.title.toLowerCase().localeCompare(b.title.toLowerCase()));
    cachedOptions = allSongs.map(s => `<option value="${escHtml(s.title)}">${escHtml(s.title)}</option>`).join('');
    setStatus('ready', `${allSongs.length} songs loaded`);
    container.innerHTML = '';
    addSongSlot();
  } catch (err) {
    console.error(err);
    setStatus('error', 'Failed to load songs');
    container.innerHTML = '<div class="error-msg">Could not load songs. Make sure the Google Sheet is set to "Anyone with the link can view" and refresh.</div>';
  }
}

function addSongSlot(preselect = null) {
  if (allSongs.length === 0) { showToast('Songs are still loading, please wait', 'error'); return; }
  slotCount++;
  const id  = slotCount;
  const div = document.createElement('div');
  div.className = 'song-slot';
  div.id        = `slot-${id}`;
  div.innerHTML = `
    <div class="slot-header">
      <span class="slot-number">Song ${id}</span>
      <select class="slot-select" id="select-${id}" onchange="onSongSelected(${id})">
        <option value="">— Choose a song —</option>${cachedOptions}
      </select>
      <button class="remove-btn" onclick="removeSlot(${id})">✕</button>
    </div>
    <div class="lyrics-area" id="lyrics-area-${id}">
      <div class="lyrics-label"><span>Lyrics</span><span class="edit-hint">Click to edit</span></div>
      <textarea class="lyrics-text" id="lyrics-${id}" spellcheck="true"></textarea>
    </div>`;
  document.getElementById('slotsContainer').appendChild(div);
  if (preselect) { const s = document.getElementById(`select-${id}`); s.value = preselect; onSongSelected(id); }
}

function removeSlot(id) {
  const s = document.getElementById(`slot-${id}`);
  if (s) s.remove();
}

function onSongSelected(id) {
  const sel  = document.getElementById(`select-${id}`);
  const area = document.getElementById(`lyrics-area-${id}`);
  const ta   = document.getElementById(`lyrics-${id}`);
  if (!sel.value) { area.classList.remove('visible'); return; }
  const song = allSongs.find(s => s.title === sel.value);
  if (song) { ta.value = song.lyrics; area.classList.add('visible'); }
}

function setSearchMode(mode) {
  searchMode = mode;
  document.getElementById('searchTitleBtn').classList.toggle('active', mode === 'title');
  document.getElementById('searchLyricBtn').classList.toggle('active', mode === 'lyric');
  handleSearch();
}

function handleSearch() {
  const q  = document.getElementById('searchInput').value.trim().toLowerCase();
  const el = document.getElementById('searchResults');
  if (q.length < 2) { el.classList.remove('visible'); return; }
  const matches = allSongs.filter(s =>
    searchMode === 'title' ? s.title.toLowerCase().includes(q)
      : s.title.toLowerCase().includes(q) || s.lyrics.toLowerCase().includes(q)
  );
  if (!matches.length) {
    el.innerHTML = '<div class="search-result-item"><span class="result-title" style="color:#666">No results found</span></div>';
    el.classList.add('visible'); return;
  }
  el.innerHTML = matches.slice(0, 20).map(song => {
    let snippet = '';
    if (searchMode === 'lyric' && song.lyrics.toLowerCase().includes(q)) {
      const idx = song.lyrics.toLowerCase().indexOf(q);
      const st  = Math.max(0, idx - 30);
      snippet   = highlight((st > 0 ? '...' : '') + song.lyrics.substring(st, idx + q.length + 40).replace(/\n/g,' ') + '...', q);
    }
    return `<div class="search-result-item" onmousedown="addSongFromSearch('${escJs(song.title)}')">
      <div class="result-title">${highlight(song.title, q)}</div>
      ${snippet ? `<div class="result-snippet">${snippet}</div>` : ''}
    </div>`;
  }).join('');
  el.classList.add('visible');
}

function addSongFromSearch(title) {
  document.getElementById('searchResults').classList.remove('visible');
  document.getElementById('searchInput').value = '';
  const sels = document.querySelectorAll('.slot-select');
  for (const s of sels) { if (s.value === title) { showToast(`"${title}" already added`, 'error'); return; } }
  for (const s of sels) { if (!s.value) { s.value = title; onSongSelected(parseInt(s.id.replace('select-',''))); return; } }
  addSongSlot(title);
}

function openAddSongModal()  { document.getElementById('addSongModal').classList.add('open'); document.getElementById('newSongTitle').focus(); }
function closeAddSongModal() { document.getElementById('addSongModal').classList.remove('open'); document.getElementById('newSongTitle').value = ''; document.getElementById('newSongLyrics').value = ''; }

async function saveNewSong() {
  const title  = document.getElementById('newSongTitle').value.trim();
  const lyrics = document.getElementById('newSongLyrics').value.trim();
  if (!title || !lyrics) { showToast('Please enter both a title and lyrics', 'error'); return; }
  if (allSongs.find(s => s.title.toLowerCase() === title.toLowerCase())) { showToast('Song already exists', 'error'); return; }
  const btn = document.getElementById('saveNewSongBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    await postToSheet({ action: 'addSong', title, lyrics });
    allSongs.push({ title, lyrics });
    allSongs.sort((a, b) => a.title.toLowerCase().localeCompare(b.title.toLowerCase()));
    cachedOptions = allSongs.map(s => `<option value="${escHtml(s.title)}">${escHtml(s.title)}</option>`).join('');
    document.querySelectorAll('.slot-select').forEach(s => { const c = s.value; s.innerHTML = `<option value="">— Choose a song —</option>${cachedOptions}`; if (c) s.value = c; });
    closeAddSongModal();
    showToast(`"${title}" added to song library`);
  } catch (e) { showToast('Could not save — please try again', 'error'); console.error(e); }
  finally { btn.disabled = false; btn.textContent = 'Save Song'; }
}

async function submitSelections() {
  const name = document.getElementById('memberName').value.trim();
  const date = document.getElementById('sundayDate').value;
  document.getElementById('memberName').classList.toggle('error-field', !name);
  document.getElementById('sundayDate').classList.toggle('error-field', !date);
  if (!name || !date) { showToast('Please fill in your name and date', 'error'); return; }

  const selections = [];
  document.querySelectorAll('.slot-select').forEach(s => {
    if (s.value) selections.push({ title: s.value, lyrics: document.getElementById(`lyrics-${s.id.replace('select-','')}`).value });
  });
  if (!selections.length) { showToast('Please select at least one song', 'error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Submitting...';

  try {
    const d   = new Date(date + 'T00:00:00');
    const fmt = d.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    const row = [new Date().toLocaleString('en-US'), name, fmt];
    selections.forEach(s => { row.push(s.title); row.push(s.lyrics); });
    await postToSheet({ action: 'addSelection', tab: SELECTIONS_TAB, row });
    showToast(`Submitted! Thank you, ${name.split(' ')[0]}.`);
    setTimeout(() => {
      document.getElementById('memberName').value = '';
      document.getElementById('memberName').classList.remove('error-field');
      document.getElementById('sundayDate').classList.remove('error-field');
      setNextSunday();
      document.getElementById('slotsContainer').innerHTML = '';
      slotCount = 0;
      addSongSlot();
      btn.disabled = false; btn.textContent = 'Submit Song Selections';
    }, 1500);
  } catch (e) {
    showToast('Submission failed — please try again', 'error');
    console.error(e);
    btn.disabled = false; btn.textContent = 'Submit Song Selections';
  }
}

function postToSheet(payload) {
  return new Promise(resolve => {
    const name   = 'gs_' + Date.now();
    const iframe = document.createElement('iframe');
    iframe.name  = name; iframe.style.display = 'none';
    document.body.appendChild(iframe);
    const form   = document.createElement('form');
    form.method  = 'POST'; form.action = APPS_SCRIPT_URL; form.target = name; form.style.display = 'none';
    const input  = document.createElement('input');
    input.type   = 'hidden'; input.name = 'payload'; input.value = JSON.stringify(payload);
    form.appendChild(input); document.body.appendChild(form);
    form.submit();
    setTimeout(() => {
      try { document.body.removeChild(form); } catch(e) {}
      try { document.body.removeChild(iframe); } catch(e) {}
      resolve();
    }, 1000);
  });
}

function setStatus(s, t) { document.getElementById('statusDot').className = `status-dot ${s}`; document.getElementById('statusText').textContent = t; }
let toastTimer;
function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show${type==='error'?' error-toast':''}`;
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s)   { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function escRegex(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function highlight(text, q) { if (!q) return escHtml(text); return escHtml(text).replace(new RegExp(`(${escRegex(q)})`,'gi'),'<mark>$1</mark>'); }
</script>
</body>
</html>
