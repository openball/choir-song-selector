<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choir Song Selector</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #7a5f28;
    --deep: #0e0e14;
    --surface: #16161f;
    --panel: #1e1e2e;
    --panel2: #252535;
    --border: #2e2e45;
    --text: #e8e4d8;
    --text-muted: #8a8790;
    --red: #e05555;
    --green: #4caf82;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--deep);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,168,76,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(201,168,76,0.04) 0%, transparent 50%);
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .logo span { font-size: 1.4rem; }

  .header-status {
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s;
  }

  .status-dot.loading { background: var(--gold); animation: pulse 1s infinite; }
  .status-dot.ready { background: var(--green); }
  .status-dot.error { background: var(--red); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── MAIN ── */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── CARD ── */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  /* ── MEMBER FORM ── */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

  .field label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
  }

  .field input {
    width: 100%;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 0.9rem;
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    transition: border-color 0.2s;
    outline: none;
  }

  .field input:focus { border-color: var(--gold); }
  .field input.error-field { border-color: var(--red); }

  /* ── SEARCH BAR ── */
  .search-wrap {
    position: relative;
    margin-bottom: 1.5rem;
  }

  .search-wrap input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem 0.75rem 2.8rem;
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--gold); }

  .search-icon {
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1rem;
    pointer-events: none;
  }

  .search-toggle {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .toggle-btn {
    font-size: 0.72rem;
    padding: 0.3rem 0.7rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Lato', sans-serif;
  }

  .toggle-btn.active {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* Search results dropdown */
  .search-results {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 10px;
    max-height: 280px;
    overflow-y: auto;
    z-index: 200;
    display: none;
  }

  .search-results.visible { display: block; }

  .search-result-item {
    padding: 0.65rem 1rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--panel); }

  .result-title {
    font-size: 0.9rem;
    color: var(--text);
    font-weight: 700;
  }

  .result-snippet {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.15rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  mark {
    background: rgba(201,168,76,0.3);
    color: var(--gold-light);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ── SONG SLOTS ── */
  .song-slot {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 1.2rem;
    overflow: hidden;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .slot-header {
    display: flex;
    align-items: center;
    padding: 0.9rem 1.2rem;
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    gap: 0.8rem;
  }

  .slot-number {
    font-family: 'Playfair Display', serif;
    font-size: 0.8rem;
    color: var(--gold);
    min-width: 56px;
  }

  .slot-select {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 0.8rem;
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    max-width: 100%;
  }

  .slot-select:focus { border-color: var(--gold); }

  .slot-select option { background: var(--panel2); }

  .remove-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    width: 30px; height: 30px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }

  .remove-btn:hover { border-color: var(--red); color: var(--red); }

  /* Lyrics area */
  .lyrics-area {
    display: none;
    padding: 1.2rem;
    animation: fadeIn 0.25s ease;
  }

  .lyrics-area.visible { display: block; }

  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .lyrics-label {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .edit-hint {
    font-size: 0.68rem;
    color: var(--gold-dim);
    font-style: italic;
  }

  .lyrics-text {
    width: 100%;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-size: 0.92rem;
    line-height: 1.8;
    min-height: 160px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    white-space: pre-wrap;
  }

  .lyrics-text:focus { border-color: var(--gold); }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    padding: 0.7rem 1.4rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

  .btn-gold {
    background: var(--gold);
    color: var(--deep);
  }

  .btn-gold:hover { background: var(--gold-light); }
  .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-green {
    background: var(--green);
    color: var(--deep);
  }

  .btn-green:hover { filter: brightness(1.1); }

  .actions-row {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 520px;
    animation: popIn 0.25s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.95); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--gold);
    margin-bottom: 1.2rem;
  }

  .modal-field {
    margin-bottom: 1rem;
  }

  .modal-field label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.35rem;
  }

  .modal-field input,
  .modal-field textarea {
    width: 100%;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 0.9rem;
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-size: 0.92rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .modal-field input:focus,
  .modal-field textarea:focus { border-color: var(--gold); }

  .modal-field textarea {
    min-height: 160px;
    resize: vertical;
    line-height: 1.7;
  }

  .modal-actions {
    display: flex;
    gap: 0.7rem;
    justify-content: flex-end;
    margin-top: 1.2rem;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1.4rem;
    font-size: 0.88rem;
    color: var(--text);
    z-index: 600;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.error-toast { border-color: var(--red); }

  /* ── LOADING SKELETON ── */
  .skeleton {
    background: linear-gradient(90deg, var(--panel2) 25%, var(--panel) 50%, var(--panel2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
    height: 38px;
    margin-bottom: 0.5rem;
  }

  @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }

  /* ── ERROR STATE ── */
  .error-msg {
    background: rgba(224,85,85,0.1);
    border: 1px solid rgba(224,85,85,0.3);
    border-radius: 8px;
    padding: 1rem;
    color: #e08080;
    font-size: 0.88rem;
    line-height: 1.6;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.8;
  }

  .empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo"><span>🎵</span> Choir Song Selector</div>
  <div class="header-status">
    <div class="status-dot loading" id="statusDot"></div>
    <span id="statusText">Loading songs...</span>
  </div>
</header>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ADD NEW SONG MODAL -->
<div class="modal-overlay" id="addSongModal">
  <div class="modal">
    <div class="modal-title">✦ Add New Song</div>
    <div class="modal-field">
      <label>Song Title *</label>
      <input type="text" id="newSongTitle" placeholder="Enter song title...">
    </div>
    <div class="modal-field">
      <label>Lyrics *</label>
      <textarea id="newSongLyrics" placeholder="Paste lyrics here...&#10;&#10;Use blank lines to separate verses."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddSongModal()">Cancel</button>
      <button class="btn btn-gold" id="saveNewSongBtn" onclick="saveNewSong()">💾 Save Song</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<main>

  <!-- MEMBER INFO -->
  <div class="section-title">Member Information</div>
  <div class="card">
    <div class="form-row">
      <div class="field">
        <label>Your Name *</label>
        <input type="text" id="memberName" placeholder="First and Last Name">
      </div>
      <div class="field">
        <label>Sunday Date *</label>
        <input type="date" id="sundayDate">
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="section-title">Search Songs</div>
  <div style="position:relative" id="searchContainer">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by title or lyrics..." autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="search-toggle">
      <button class="toggle-btn active" id="searchTitleBtn" onclick="setSearchMode('title')">By Title</button>
      <button class="toggle-btn" id="searchLyricBtn" onclick="setSearchMode('lyric')">By Lyric</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- SONG SLOTS -->
  <div class="section-title">Selected Songs</div>
  <div id="slotsContainer"></div>

  <div class="actions-row">
    <button class="btn btn-ghost" onclick="addSongSlot()">＋ Add Another Song</button>
    <button class="btn btn-ghost" onclick="openAddSongModal()">✦ Add New Song to Library</button>
  </div>

  <div class="divider"></div>

  <!-- SUBMIT -->
  <div style="display:flex; justify-content:flex-end;">
    <button class="btn btn-green" id="submitBtn" onclick="submitSelections()" style="font-size:0.95rem; padding:0.85rem 2rem;">
      ✓ Submit Song Selections
    </button>
  </div>

</main>

<script>
// ============================================================
// CONFIGURATION — Update SHEET_ID if your sheet changes
// ============================================================
const SHEET_ID = '111kgT6cmIt7JM1pjhl0rMOi1YDNMOI4DwasE2idpkAE';
const SONGS_TAB = 'Songs';
const SELECTIONS_TAB = 'Selections';

// Google Sheets public JSON URL (no API key needed for public sheets)
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=`;

// ============================================================
// STATE
// ============================================================
let allSongs = [];       // [{title, lyrics}, ...]
let cachedOptions = '';  // Pre-built <option> HTML
let slotCount = 0;
let searchMode = 'title'; // 'title' | 'lyric'

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  setDefaultSundayDate();
  loadSongs();

  // Search input handler
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', debounce(handleSearch, 200));
  searchInput.addEventListener('blur', () => {
    setTimeout(() => {
      document.getElementById('searchResults').classList.remove('visible');
    }, 200);
  });
  searchInput.addEventListener('focus', () => {
    if (searchInput.value.trim().length >= 2) handleSearch();
  });
});

// ============================================================
// DATE — Default to next Sunday
// ============================================================
function setDefaultSundayDate() {
  const today = new Date();
  const day = today.getDay(); // 0=Sun
  const daysUntilSunday = day === 0 ? 7 : 7 - day;
  const nextSunday = new Date(today);
  nextSunday.setDate(today.getDate() + daysUntilSunday);
  const yyyy = nextSunday.getFullYear();
  const mm = String(nextSunday.getMonth() + 1).padStart(2, '0');
  const dd = String(nextSunday.getDate()).padStart(2, '0');
  document.getElementById('sundayDate').value = `${yyyy}-${mm}-${dd}`;
}

// ============================================================
// LOAD SONGS from Google Sheet
// ============================================================
async function loadSongs() {
  setStatus('loading', 'Loading songs...');

  // Show skeleton in slots container
  const container = document.getElementById('slotsContainer');
  container.innerHTML = `
    <div class="card">
      <div class="skeleton"></div>
      <div class="skeleton" style="width:70%"></div>
      <div class="skeleton" style="width:85%"></div>
    </div>`;

  try {
    const response = await fetch(SHEET_URL + encodeURIComponent(SONGS_TAB));
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const text = await response.text();
    // Google wraps JSON in a callback — strip it
    const json = JSON.parse(text.replace(/^.*?({.*}).*$/s, '$1'));
    const rows = json.table.rows;

    allSongs = rows
      .filter(row => row.c && row.c[0] && row.c[0].v)
      .map(row => ({
        title: String(row.c[0].v).trim(),
        lyrics: row.c[1] ? String(row.c[1].v).trim() : ''
      }))
      .sort((a, b) => a.title.toLowerCase().localeCompare(b.title.toLowerCase()));

    // Build options HTML once — reused by every slot
    cachedOptions = allSongs.map(s =>
      `<option value="${escHtml(s.title)}">${escHtml(s.title)}</option>`
    ).join('');

    setStatus('ready', `${allSongs.length} songs loaded`);
    container.innerHTML = '';
    addSongSlot(); // Start with one slot

  } catch (err) {
    console.error(err);
    setStatus('error', 'Failed to load songs');
    container.innerHTML = `
      <div class="error-msg">
        ⚠️ Could not load songs from Google Sheets.<br><br>
        <strong>Possible causes:</strong><br>
        • The Google Sheet is not set to "Anyone with the link can view"<br>
        • The Sheet ID in the app needs updating<br>
        • Network connectivity issue<br><br>
        Please check your Sheet sharing settings and refresh the page.
      </div>`;
  }
}

// ============================================================
// SONG SLOTS
// ============================================================
function addSongSlot(preselect = null) {
  slotCount++;
  const id = slotCount;
  const container = document.getElementById('slotsContainer');

  if (allSongs.length === 0) {
    // Songs not yet loaded — try again in 1 second
    slotCount--;
    setTimeout(() => addSongSlot(preselect), 1000);
    return;
  }

  const div = document.createElement('div');
  div.className = 'song-slot';
  div.id = `slot-${id}`;

  const options = cachedOptions;

  div.innerHTML = `
    <div class="slot-header">
      <span class="slot-number">Song ${id}</span>
      <select class="slot-select" id="select-${id}" onchange="onSongSelected(${id})">
        <option value="">— Choose a song —</option>
        ${options}
      </select>
      <button class="remove-btn" onclick="removeSlot(${id})" title="Remove">✕</button>
    </div>
    <div class="lyrics-area" id="lyrics-area-${id}">
      <div class="lyrics-label">
        <span>Lyrics</span>
        <span class="edit-hint">✏️ Click to edit</span>
      </div>
      <textarea class="lyrics-text" id="lyrics-${id}" spellcheck="true"></textarea>
    </div>`;

  container.appendChild(div);

  // Preselect if provided (from search click)
  if (preselect) {
    const sel = document.getElementById(`select-${id}`);
    sel.value = preselect;
    onSongSelected(id);
  }
}

function removeSlot(id) {
  const slot = document.getElementById(`slot-${id}`);
  if (slot) {
    slot.style.opacity = '0';
    slot.style.transform = 'translateX(-10px)';
    slot.style.transition = 'all 0.2s';
    setTimeout(() => slot.remove(), 200);
  }
}

function onSongSelected(id) {
  const sel = document.getElementById(`select-${id}`);
  const lyricsArea = document.getElementById(`lyrics-area-${id}`);
  const lyricsText = document.getElementById(`lyrics-${id}`);

  const title = sel.value;
  if (!title) {
    lyricsArea.classList.remove('visible');
    return;
  }

  const song = allSongs.find(s => s.title === title);
  if (song) {
    lyricsText.value = song.lyrics;
    lyricsArea.classList.add('visible');
  }
}

// ============================================================
// SEARCH
// ============================================================
function setSearchMode(mode) {
  searchMode = mode;
  document.getElementById('searchTitleBtn').classList.toggle('active', mode === 'title');
  document.getElementById('searchLyricBtn').classList.toggle('active', mode === 'lyric');
  handleSearch();
}

function handleSearch() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const resultsEl = document.getElementById('searchResults');

  if (query.length < 2) {
    resultsEl.classList.remove('visible');
    return;
  }

  let matches;
  if (searchMode === 'title') {
    matches = allSongs.filter(s => s.title.toLowerCase().includes(query));
  } else {
    matches = allSongs.filter(s =>
      s.title.toLowerCase().includes(query) ||
      s.lyrics.toLowerCase().includes(query)
    );
  }

  if (matches.length === 0) {
    resultsEl.innerHTML = `<div class="search-result-item"><span class="result-title" style="color:var(--text-muted)">No results found</span></div>`;
    resultsEl.classList.add('visible');
    return;
  }

  resultsEl.innerHTML = matches.slice(0, 20).map(song => {
    const highlightedTitle = highlight(song.title, query);
    let snippet = '';
    if (searchMode === 'lyric' && song.lyrics.toLowerCase().includes(query)) {
      const idx = song.lyrics.toLowerCase().indexOf(query);
      const start = Math.max(0, idx - 30);
      const raw = song.lyrics.substring(start, idx + query.length + 40).replace(/\n/g, ' ');
      snippet = highlight((start > 0 ? '...' : '') + raw + '...', query);
    }
    return `
      <div class="search-result-item" onmousedown="addSongFromSearch('${escJs(song.title)}')">
        <div class="result-title">${highlightedTitle}</div>
        ${snippet ? `<div class="result-snippet">${snippet}</div>` : ''}
      </div>`;
  }).join('');

  resultsEl.classList.add('visible');
}

function addSongFromSearch(title) {
  document.getElementById('searchResults').classList.remove('visible');
  document.getElementById('searchInput').value = '';

  // Check if already selected
  const allSelects = document.querySelectorAll('.slot-select');
  for (const sel of allSelects) {
    if (sel.value === title) {
      showToast(`"${title}" is already added`, 'error');
      return;
    }
  }

  // Find an empty slot first
  for (const sel of allSelects) {
    if (!sel.value) {
      sel.value = title;
      onSongSelected(parseInt(sel.id.replace('select-', '')));
      return;
    }
  }

  // Otherwise add a new slot
  addSongSlot(title);
}

function highlight(text, query) {
  if (!query) return escHtml(text);
  const regex = new RegExp(`(${escRegex(query)})`, 'gi');
  return escHtml(text).replace(regex, '<mark>$1</mark>');
}

// ============================================================
// ADD NEW SONG MODAL
// ============================================================
function openAddSongModal() {
  document.getElementById('addSongModal').classList.add('open');
  document.getElementById('newSongTitle').focus();
}

function closeAddSongModal() {
  document.getElementById('addSongModal').classList.remove('open');
  document.getElementById('newSongTitle').value = '';
  document.getElementById('newSongLyrics').value = '';
}

async function saveNewSong() {
  const title = document.getElementById('newSongTitle').value.trim();
  const lyrics = document.getElementById('newSongLyrics').value.trim();

  if (!title || !lyrics) {
    showToast('Please enter both a title and lyrics', 'error');
    return;
  }

  // Check for duplicate
  if (allSongs.find(s => s.title.toLowerCase() === title.toLowerCase())) {
    showToast('A song with this title already exists', 'error');
    return;
  }

  const btn = document.getElementById('saveNewSongBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    // Write to Google Sheet via Apps Script Web App
    // NOTE: This requires deploying an Apps Script — see instructions below
    await writeToSheet(SELECTIONS_TAB, null, title, lyrics, true);

    // Add to local song list
    allSongs.push({ title, lyrics });
    allSongs.sort((a, b) => a.title.toLowerCase().localeCompare(b.title.toLowerCase()));

    // Refresh all select dropdowns
    refreshAllDropdowns();

    closeAddSongModal();
    showToast(`✓ "${title}" added to song library`, 'success');

  } catch (err) {
    showToast('Could not save song — see console for details', 'error');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Save Song';
  }
}

function refreshAllDropdowns() {
  cachedOptions = allSongs.map(s =>
    `<option value="${escHtml(s.title)}">${escHtml(s.title)}</option>`
  ).join('');
  const options = cachedOptions;

  document.querySelectorAll('.slot-select').forEach(sel => {
    const current = sel.value;
    sel.innerHTML = `<option value="">— Choose a song —</option>${options}`;
    if (current) sel.value = current;
  });
}

// ============================================================
// SUBMIT SELECTIONS
// ============================================================
async function submitSelections() {
  const name = document.getElementById('memberName').value.trim();
  const date = document.getElementById('sundayDate').value;

  // Validate
  let valid = true;

  if (!name) {
    document.getElementById('memberName').classList.add('error-field');
    valid = false;
  } else {
    document.getElementById('memberName').classList.remove('error-field');
  }

  if (!date) {
    document.getElementById('sundayDate').classList.add('error-field');
    valid = false;
  } else {
    document.getElementById('sundayDate').classList.remove('error-field');
  }

  // Collect song selections
  const selections = [];
  document.querySelectorAll('.slot-select').forEach((sel, i) => {
    if (sel.value) {
      const slotId = sel.id.replace('select-', '');
      const lyrics = document.getElementById(`lyrics-${slotId}`).value;
      selections.push({ title: sel.value, lyrics });
    }
  });

  if (selections.length === 0) {
    showToast('Please select at least one song', 'error');
    valid = false;
  }

  if (!valid) {
    showToast('Please fill in all required fields', 'error');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    // Format date for display
    const dateObj = new Date(date + 'T00:00:00');
    const formattedDate = dateObj.toLocaleDateString('en-US', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    // Build row: Timestamp, Name, Date, Song1, Lyrics1, Song2, Lyrics2, ...
    const timestamp = new Date().toLocaleString('en-US');
    const rowData = [timestamp, name, formattedDate];
    selections.forEach(s => {
      rowData.push(s.title);
      rowData.push(s.lyrics);
    });

    await writeToSheet(SELECTIONS_TAB, rowData);

    showToast(`✓ Selections submitted! Thank you, ${name.split(' ')[0]}.`, 'success');

    // Reset form for next user
    setTimeout(() => {
      document.getElementById('memberName').value = '';
      document.getElementById('memberName').classList.remove('error-field');
      document.getElementById('sundayDate').classList.remove('error-field');
      setDefaultSundayDate();
      document.getElementById('slotsContainer').innerHTML = '';
      slotCount = 0;
      addSongSlot();
      // Re-enable button here, inside the reset, to ensure it's always re-enabled
      btn.disabled = false;
      btn.textContent = '✓ Submit Song Selections';
    }, 1500);

  } catch (err) {
    showToast('Submission failed — please try again', 'error');
    console.error(err);
    btn.disabled = false;
    btn.textContent = '✓ Submit Song Selections';
  }
}

// ============================================================
// WRITE TO GOOGLE SHEET
// Requires an Apps Script Web App deployment
// Paste your deployed Web App URL below after deploying Code.gs
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKsDqN01aAzuWgSqw7anxgPXbEREM38EFoXDU_hfXAcz6Rub--UMJ4eu67E-ulyddIzw/exec';

async function writeToSheet(tab, rowData, newSongTitle = null, newSongLyrics = null, isNewSong = false) {
  if (!APPS_SCRIPT_URL) {
    throw new Error('Apps Script URL is empty. Please set it in index.html.');
  }

  const payload = isNewSong
    ? { action: 'addSong', title: newSongTitle, lyrics: newSongLyrics }
    : { action: 'addSelection', tab, row: rowData };

  // Google Apps Script redirects POST to a new URL.
  // We must use no-cors mode OR use a form-encoded GET workaround.
  // Most reliable cross-origin approach: encode payload as a URL param on a GET request.
  // Apps Script doGet() handles this and avoids all CORS/redirect issues.
  const url = APPS_SCRIPT_URL + '?payload=' + encodeURIComponent(JSON.stringify(payload));

  const response = await fetch(url, {
    method: 'GET',
    redirect: 'follow'
  });

  if (!response.ok) throw new Error(`Script error: ${response.status}`);

  let result;
  try {
    const text = await response.text();
    result = JSON.parse(text);
  } catch (e) {
    throw new Error('Invalid response from Apps Script. Check your deployment.');
  }

  if (result.status !== 'ok') throw new Error(result.message || 'Unknown error from Apps Script');
}

// ============================================================
// UTILITIES
// ============================================================
function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const label = document.getElementById('statusText');
  dot.className = `status-dot ${state}`;
  label.textContent = text;
}

let toastTimer;
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type === 'error' ? 'error-toast' : 'success'}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escJs(str) {
  return String(str).replace(/'/g, "\\'").replace(/\\/g, '\\\\');
}

function escRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
