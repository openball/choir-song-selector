<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Choir Selections Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #fff; color: #111; min-height: 100vh; }

  header { background: #000; padding: 0 2rem; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .logo { font-family: Georgia, serif; font-size: 1.1rem; color: #fff; display: flex; align-items: center; gap: 0.5rem; }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .header-link { font-family: Arial, sans-serif; font-size: 0.78rem; color: #aaa; text-decoration: none; }
  .header-link:hover { color: #fff; }

  main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* Controls */
  .controls { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; }
  .date-label { font-family: Arial, sans-serif; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: #666; }
  .date-input { background: #fff; border: 1px solid #ccc; border-radius: 3px; padding: 0.5rem 0.8rem; color: #111; font-family: Arial, sans-serif; font-size: 0.9rem; outline: none; cursor: pointer; }
  .date-input:focus { border-color: #000; }
  .date-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .date-tab { font-family: Arial, sans-serif; font-size: 0.8rem; padding: 0.4rem 0.9rem; border-radius: 3px; border: 1px solid #ccc; background: #fff; color: #666; cursor: pointer; white-space: nowrap; }
  .date-tab:hover { border-color: #000; color: #111; }
  .date-tab.active { background: #000; border-color: #000; color: #fff; }

  .btn { font-family: Arial, sans-serif; font-size: 0.82rem; font-weight: bold; padding: 0.5rem 1rem; border-radius: 3px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem; }
  .btn-ghost { background: #fff; border: 1px solid #ccc; color: #111; }
  .btn-ghost:hover { border-color: #000; }
  .btn-black { background: #000; color: #fff; border: 1px solid #000; }
  .btn-black:hover { background: #333; }

  /* Empty / loading states */
  .state-msg { text-align: center; padding: 3rem 1rem; color: #888; font-family: Arial, sans-serif; font-size: 0.9rem; }
  .skeleton { background: linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 3px; height: 24px; margin-bottom: 0.6rem; }
  @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

  /* Summary bar */
  .summary { font-family: Arial, sans-serif; font-size: 0.8rem; color: #666; margin-bottom: 1.5rem; padding-bottom: 0.8rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
  .summary strong { color: #111; }

  /* Member block */
  .member-block { margin-bottom: 2.5rem; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
  .member-header { background: #f5f5f5; border-bottom: 1px solid #ddd; padding: 0.8rem 1.2rem; display: flex; justify-content: space-between; align-items: center; }
  .member-name { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.95rem; color: #111; }
  .member-meta { font-family: Arial, sans-serif; font-size: 0.75rem; color: #888; }
  .member-songs { padding: 1.2rem; }

  /* Song block */
  .song-block { margin-bottom: 1.5rem; }
  .song-block:last-child { margin-bottom: 0; }
  .song-title { font-family: Georgia, serif; font-size: 1.05rem; font-weight: bold; color: #111; margin-bottom: 0.5rem; padding-bottom: 0.3rem; border-bottom: 1px solid #eee; }
  .song-lyrics { font-family: Georgia, serif; font-size: 0.92rem; line-height: 1.8; color: #222; white-space: pre-wrap; }

  /* Divider between songs */
  .song-divider { height: 1px; background: #f0f0f0; margin: 1.2rem 0; }

  /* ── PRINT STYLES ── */
  @media print {
    header, .controls, .summary, .member-header .member-meta, .no-print { display: none !important; }
    body { font-size: 11pt; }
    main { padding: 0; max-width: 100%; }
    .member-block { border: none; page-break-inside: avoid; margin-bottom: 1.5rem; }
    .member-header { background: none; border-bottom: 2px solid #000; padding: 0.4rem 0; }
    .member-name { font-size: 12pt; }
    .song-title { font-size: 13pt; margin-top: 1rem; }
    .song-lyrics { font-size: 11pt; line-height: 1.7; }
    .song-block { page-break-inside: avoid; }
  }

  /* View toggle */
  .view-toggle { display: flex; gap: 0; margin-left: auto; }
  .view-btn { font-family: Arial, sans-serif; font-size: 0.75rem; padding: 0.35rem 0.8rem; border: 1px solid #ccc; background: #fff; color: #666; cursor: pointer; }
  .view-btn:first-child { border-radius: 3px 0 0 3px; }
  .view-btn:last-child  { border-radius: 0 3px 3px 0; border-left: none; }
  .view-btn.active { background: #000; border-color: #000; color: #fff; }

  /* Song-centric view */
  .song-group { margin-bottom: 2.5rem; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
  .song-group-header { background: #111; color: #fff; padding: 0.8rem 1.2rem; display: flex; justify-content: space-between; align-items: center; }
  .song-group-title { font-family: Georgia, serif; font-size: 1rem; font-weight: bold; }
  .song-group-count { font-family: Arial, sans-serif; font-size: 0.75rem; color: #aaa; }
  .versions-grid { display: grid; gap: 0; }
  .versions-grid.count-1 { grid-template-columns: 1fr; }
  .versions-grid.count-2 { grid-template-columns: 1fr 1fr; }
  .versions-grid.count-3 { grid-template-columns: 1fr 1fr 1fr; }
  .versions-grid.count-4 { grid-template-columns: repeat(4, 1fr); }
  @media (max-width: 700px) { .versions-grid { grid-template-columns: 1fr !important; } }
  .version-col { padding: 1rem 1.2rem; border-right: 1px solid #eee; }
  .version-col:last-child { border-right: none; }
  .version-member { font-family: Arial, sans-serif; font-size: 0.75rem; font-weight: bold; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.6rem; padding-bottom: 0.4rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
  .version-lyrics { font-family: Georgia, serif; font-size: 0.88rem; line-height: 1.8; color: #222; white-space: pre-wrap; }
  .line-diff { background: #f5f5f5; border-left: 2px solid #999; padding-left: 4px; }
  .use-btn { font-family: Arial, sans-serif; font-size: 0.68rem; padding: 0.2rem 0.5rem; border-radius: 2px; border: 1px solid #ccc; background: #fff; color: #666; cursor: pointer; }
  .use-btn:hover { border-color: #000; color: #000; }
  .use-btn.selected { background: #000; border-color: #000; color: #fff; }
  @media print {
    .versions-grid { grid-template-columns: 1fr !important; }
    .version-col { border-right: none; border-bottom: 1px solid #eee; }
    .use-btn, .view-toggle, .song-group-count { display: none; }
    .song-group-header { background: none !important; color: #000 !important; border-bottom: 2px solid #000; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🎵 Choir Selections Viewer</div>
  <div class="header-right">
    <a href="index.html" class="header-link">← Song Selector</a>
    <button class="btn btn-ghost no-print" onclick="window.print()" style="color:#fff;border-color:#444;background:transparent;font-size:0.75rem;">🖨 Print</button>
  </div>
</header>

<main>

  <!-- Date controls -->
  <div class="controls no-print" style="align-items:center;">
    <span class="date-label">Sunday:</span>
    <div class="date-tabs" id="dateTabs"></div>
    <input type="date" class="date-input" id="customDate" title="Pick any date">
    <button class="btn btn-black" onclick="loadForDate(document.getElementById('customDate').value)">Go</button>
    <div class="view-toggle no-print" style="margin-left:auto;">
      <button class="view-btn active" id="viewByMember" onclick="setView('member')">By Member</button>
      <button class="view-btn" id="viewBySong" onclick="setView('song')">By Song</button>
    </div>
    <button class="btn btn-ghost" onclick="exportText()" title="Copy all songs as plain text for ProPresenter">📋 Copy for ProPresenter</button>
  </div>

  <!-- Results -->
  <div id="resultsArea"><div class="state-msg">Loading...</div></div>

</main>

<script>
const SHEET_ID       = '111kgT6cmIt7JM1pjhl0rMOi1YDNMOI4DwasE2idpkAE';
const SELECTIONS_TAB = 'Selections';
const SHEET_URL      = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=`;

let allSelections  = [];
let currentDate    = '';
let currentView    = 'member'; // 'member' | 'song'
let canonicalSongs = {};       // songTitle -> chosen lyrics for export

document.addEventListener('DOMContentLoaded', () => { loadAllSelections(); });

// ── LOAD ─────────────────────────────────────────────────────
async function loadAllSelections() {
  try {
    const res  = await fetch(SHEET_URL + encodeURIComponent(SELECTIONS_TAB));
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const json = JSON.parse(text.replace(/^.*?({.*}).*$/s, '$1'));
    if (!json.table || !json.table.rows) {
      document.getElementById('resultsArea').innerHTML = '<div class="state-msg">No submissions yet.</div>';
      return;
    }
    allSelections = json.table.rows
      .filter(r => r.c && r.c[0] && r.c[0].v)
      .map(r => {
        const cells = r.c.map(c => c && c.v ? String(c.v).trim() : '');
        const songs = [];
        for (let i = 3; i < cells.length; i += 2) {
          if (cells[i]) songs.push({ title: cells[i], lyrics: cells[i+1] || '' });
        }
        return { timestamp: cells[0], memberName: cells[1], sunday: cells[2], songs };
      });
    buildDateTabs();
  } catch (err) {
    console.error(err);
    document.getElementById('resultsArea').innerHTML =
      '<div class="state-msg">Could not load selections. Make sure the Google Sheet is set to "Anyone with the link can view".</div>';
  }
}

// ── DATE TABS ────────────────────────────────────────────────
function buildDateTabs() {
  const dates = [...new Set(allSelections.map(s => s.sunday))]
    .filter(Boolean)
    .sort((a, b) => parseDateStr(b) - parseDateStr(a));
  const tabsEl = document.getElementById('dateTabs');
  if (!dates.length) {
    document.getElementById('resultsArea').innerHTML = '<div class="state-msg">No submissions yet.</div>';
    return;
  }
  tabsEl.innerHTML = dates.map((d, i) =>
    `<button class="date-tab${i===0?' active':''}" onclick="selectTab(this,'${escJs(d)}')">${d}</button>`
  ).join('');
  loadForDate(dates[0]);
}

function selectTab(btn, date) {
  document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  loadForDate(date);
}

function loadForDate(dateStr) {
  if (!dateStr) return;
  currentDate    = dateStr;
  canonicalSongs = {};

  const matches = allSelections.filter(s => {
    if (!s.sunday) return false;
    if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
      const d   = new Date(dateStr + 'T00:00:00');
      const fmt = d.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
      return s.sunday === fmt || s.sunday === dateStr;
    }
    return s.sunday === dateStr;
  });

  document.querySelectorAll('.date-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.trim() === dateStr);
  });

  renderResults(matches, dateStr);
}

// ── VIEW TOGGLE ──────────────────────────────────────────────
function setView(view) {
  currentView = view;
  document.getElementById('viewByMember').classList.toggle('active', view === 'member');
  document.getElementById('viewBySong').classList.toggle('active', view === 'song');
  loadForDate(currentDate);
}

// ── RENDER ───────────────────────────────────────────────────
function renderResults(matches, dateStr) {
  const area = document.getElementById('resultsArea');
  if (!matches.length) {
    area.innerHTML = `<div class="state-msg">No submissions found for <strong>${escHtml(dateStr)}</strong>.</div>`;
    return;
  }
  const allTitles = [...new Set(matches.flatMap(m => m.songs.map(s => s.title)))];
  const summaryHtml = `<div class="summary">
    <span><strong>${matches.length}</strong> member${matches.length!==1?'s':''} &nbsp;·&nbsp;
    <strong>${allTitles.length}</strong> unique song${allTitles.length!==1?'s':''} &nbsp;·&nbsp;
    ${escHtml(dateStr)}</span>
  </div>`;

  area.innerHTML = summaryHtml + (currentView === 'song'
    ? renderBySong(matches)
    : renderByMember(matches));
}

// ── BY MEMBER VIEW ───────────────────────────────────────────
function renderByMember(matches) {
  return matches.map(member => `
    <div class="member-block">
      <div class="member-header">
        <span class="member-name">${escHtml(member.memberName)}</span>
        <span class="member-meta">Submitted: ${escHtml(member.timestamp)}</span>
      </div>
      <div class="member-songs">
        ${member.songs.map((song, i) => `
          ${i > 0 ? '<div class="song-divider"></div>' : ''}
          <div class="song-block">
            <div class="song-title">${escHtml(song.title)}</div>
            <div class="song-lyrics">${escHtml(song.lyrics)}</div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

// ── BY SONG VIEW (side by side) ──────────────────────────────
function renderBySong(matches) {
  // Group all versions of each song across members
  const songMap = {};
  matches.forEach(member => {
    member.songs.forEach(song => {
      const key = song.title.toLowerCase().trim();
      if (!songMap[key]) songMap[key] = { title: song.title, versions: [] };
      songMap[key].versions.push({ member: member.memberName, lyrics: song.lyrics });
    });
  });

  return Object.values(songMap).map(group => {
    const count    = group.versions.length;
    const colClass = `count-${Math.min(count, 4)}`;

    // Auto-select first version as canonical for export
    if (!canonicalSongs[group.title]) {
      canonicalSongs[group.title] = group.versions[0].lyrics;
    }

    const versionsHtml = group.versions.map((v, idx) => {
      const isSelected = canonicalSongs[group.title] === v.lyrics;
      const lyricsHtml = count > 1
        ? diffLyrics(v.lyrics, group.versions.filter((_, i) => i !== idx).map(o => o.lyrics))
        : escHtml(v.lyrics);

      return `<div class="version-col">
        <div class="version-member">
          <span>${escHtml(v.member)}</span>
          ${count > 1 ? `<button class="use-btn${isSelected?' selected':''}" onclick="setCanonical('${escJs(group.title)}', ${idx}, this)">${isSelected ? '✓ Using this' : 'Use for export'}</button>` : ''}
        </div>
        <div class="version-lyrics">${lyricsHtml}</div>
      </div>`;
    }).join('');

    return `<div class="song-group">
      <div class="song-group-header">
        <span class="song-group-title">${escHtml(group.title)}</span>
        <span class="song-group-count">${count} version${count!==1?'s':''}</span>
      </div>
      <div class="versions-grid ${colClass}">${versionsHtml}</div>
    </div>`;
  }).join('');
}

// ── DIFF LYRICS ──────────────────────────────────────────────
// Highlight lines in this version that differ from all other versions
function diffLyrics(lyrics, otherVersions) {
  const lines      = lyrics.split('
');
  const otherLines = new Set(otherVersions.flatMap(v => v.split('
').map(l => l.trim().toLowerCase())));
  return lines.map(line => {
    const trimmed = line.trim().toLowerCase();
    const isDiff  = trimmed !== '' && !otherLines.has(trimmed);
    return isDiff
      ? `<span class="line-diff">${escHtml(line)}</span>`
      : escHtml(line);
  }).join('
');
}

// ── CANONICAL SELECTION ──────────────────────────────────────
function setCanonical(songTitle, versionIdx, btn) {
  const key   = songTitle.toLowerCase().trim();
  const group = Object.values(getAllSongGroups()).find(g => g.title.toLowerCase().trim() === key);
  if (!group) return;
  canonicalSongs[songTitle] = group.versions[versionIdx].lyrics;

  // Update button states in this song group
  const songGroupEl = btn.closest('.song-group');
  songGroupEl.querySelectorAll('.use-btn').forEach(b => {
    b.classList.remove('selected');
    b.textContent = 'Use for export';
  });
  btn.classList.add('selected');
  btn.textContent = '✓ Using this';
}

function getAllSongGroups() {
  const matches = allSelections.filter(s => s.sunday === currentDate);
  const map = {};
  matches.forEach(member => {
    member.songs.forEach(song => {
      const key = song.title.toLowerCase().trim();
      if (!map[key]) map[key] = { title: song.title, versions: [] };
      map[key].versions.push({ member: member.memberName, lyrics: song.lyrics });
    });
  });
  return map;
}

// ── EXPORT FOR PROPRESENTER ──────────────────────────────────
function exportText() {
  const matches = allSelections.filter(s => s.sunday === currentDate);
  if (!matches.length) { alert('No selections to export for this date.'); return; }

  // Use canonical (director-selected) versions, or first version as fallback
  const seen  = new Set();
  const songs = [];
  matches.forEach(m => m.songs.forEach(s => {
    if (!seen.has(s.title.toLowerCase())) {
      seen.add(s.title.toLowerCase());
      songs.push({ title: s.title, lyrics: canonicalSongs[s.title] || s.lyrics });
    }
  }));

  let text = `CHOIR SELECTIONS — ${currentDate}
${'='.repeat(50)}

`;
  songs.forEach((song, i) => {
    text += `[${song.title.toUpperCase()}]
${'-'.repeat(40)}
${song.lyrics}
`;
    if (i < songs.length - 1) text += `
${'='.repeat(50)}

`;
  });

  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied to clipboard — ready to paste into ProPresenter');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:10%;left:10%;width:80%;height:70%;z-index:9999;font-family:monospace;font-size:0.85rem;padding:1rem;border:2px solid #000;border-radius:4px;';
    document.body.appendChild(ta);
    ta.select();
    const close = document.createElement('button');
    close.textContent = '✕ Close';
    close.style.cssText = 'position:fixed;top:calc(10% - 2.5rem);left:10%;z-index:9999;background:#000;color:#fff;border:none;padding:0.4rem 0.8rem;border-radius:3px;cursor:pointer;font-family:Arial,sans-serif;';
    close.onclick = () => { document.body.removeChild(ta); document.body.removeChild(close); };
    document.body.appendChild(close);
    showToast('Select all and copy (Ctrl+A, Ctrl+C)');
  });
}

// ── UTILITIES ────────────────────────────────────────────────
function getNextSundayStr() {
  const today = new Date();
  const days  = today.getDay() === 0 ? 0 : 7 - today.getDay();
  const next  = new Date(today);
  next.setDate(today.getDate() + days);
  return next.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}
function parseDateStr(str) { const d = new Date(str); return isNaN(d) ? 0 : d.getTime(); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s)   { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
let toastTimer;
function showToast(msg) {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.style.cssText = 'position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#000;border-radius:3px;padding:0.65rem 1.3rem;font-family:Arial,sans-serif;font-size:0.85rem;color:#fff;z-index:600;transition:transform 0.3s ease;white-space:nowrap;';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.transform = 'translateX(-50%) translateY(80px)'; }, 3500);
}
</script>
</body>
</html>
