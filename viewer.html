<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Choir Selections Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #fff; color: #111; min-height: 100vh; }
  header { background: #000; padding: 0 2rem; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .logo { font-family: Georgia, serif; font-size: 1.1rem; color: #fff; display: flex; align-items: center; gap: 0.5rem; }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .header-link { font-family: Arial, sans-serif; font-size: 0.78rem; color: #aaa; text-decoration: none; }
  .header-link:hover { color: #fff; }
  main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* Controls */
  .controls { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 2rem; }
  .date-label { font-family: Arial, sans-serif; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: #666; }
  .date-input { background: #fff; border: 1px solid #ccc; border-radius: 3px; padding: 0.5rem 0.8rem; color: #111; font-family: Arial, sans-serif; font-size: 0.9rem; outline: none; cursor: pointer; }
  .date-input:focus { border-color: #000; }
  .date-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .date-tab { font-family: Arial, sans-serif; font-size: 0.8rem; padding: 0.4rem 0.9rem; border-radius: 3px; border: 1px solid #ccc; background: #fff; color: #666; cursor: pointer; white-space: nowrap; }
  .date-tab:hover { border-color: #000; color: #111; }
  .date-tab.active { background: #000; border-color: #000; color: #fff; }
  .btn { font-family: Arial, sans-serif; font-size: 0.82rem; font-weight: bold; padding: 0.5rem 1rem; border-radius: 3px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem; }
  .btn-ghost { background: #fff; border: 1px solid #ccc; color: #111; }
  .btn-ghost:hover { border-color: #000; }
  .btn-black { background: #000; color: #fff; border: 1px solid #000; }
  .btn-black:hover { background: #333; }

  /* View toggle */
  .view-toggle { display: flex; margin-left: auto; }
  .view-btn { font-family: Arial, sans-serif; font-size: 0.75rem; padding: 0.35rem 0.8rem; border: 1px solid #ccc; background: #fff; color: #666; cursor: pointer; }
  .view-btn:first-child { border-radius: 3px 0 0 3px; }
  .view-btn:last-child  { border-radius: 0 3px 3px 0; border-left: none; }
  .view-btn.active { background: #000; border-color: #000; color: #fff; }

  /* States */
  .state-msg { text-align: center; padding: 3rem 1rem; color: #888; font-family: Arial, sans-serif; font-size: 0.9rem; }
  .skeleton { background: linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 3px; height: 24px; margin-bottom: 0.6rem; }
  @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

  /* Summary */
  .summary { font-family: Arial, sans-serif; font-size: 0.8rem; color: #666; margin-bottom: 1.5rem; padding-bottom: 0.8rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
  .summary strong { color: #111; }

  /* By Member view */
  .member-block { margin-bottom: 2.5rem; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
  .member-header { background: #f5f5f5; border-bottom: 1px solid #ddd; padding: 0.8rem 1.2rem; display: flex; justify-content: space-between; align-items: center; }
  .member-name { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.95rem; color: #111; }
  .member-meta { font-family: Arial, sans-serif; font-size: 0.75rem; color: #888; }
  .member-songs { padding: 1.2rem; }
  .song-block { margin-bottom: 1.5rem; }
  .song-block:last-child { margin-bottom: 0; }
  .song-title { font-family: Georgia, serif; font-size: 1.05rem; font-weight: bold; color: #111; margin-bottom: 0.5rem; padding-bottom: 0.3rem; border-bottom: 1px solid #eee; }
  .song-lyrics { font-family: Georgia, serif; font-size: 0.92rem; line-height: 1.8; color: #222; white-space: pre-wrap; }
  .song-divider { height: 1px; background: #f0f0f0; margin: 1.2rem 0; }

  /* By Song view */
  .song-group { margin-bottom: 2.5rem; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
  .song-group-header { background: #111; color: #fff; padding: 0.8rem 1.2rem; display: flex; justify-content: space-between; align-items: center; }
  .song-group-title { font-family: Georgia, serif; font-size: 1rem; font-weight: bold; }
  .song-group-count { font-family: Arial, sans-serif; font-size: 0.75rem; color: #aaa; }
  .versions-grid { display: grid; }
  .versions-grid.c1 { grid-template-columns: 1fr; }
  .versions-grid.c2 { grid-template-columns: 1fr 1fr; }
  .versions-grid.c3 { grid-template-columns: 1fr 1fr 1fr; }
  .versions-grid.c4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  @media (max-width: 700px) { .versions-grid { grid-template-columns: 1fr !important; } }
  .version-col { padding: 1rem 1.2rem; border-right: 1px solid #eee; }
  .version-col:last-child { border-right: none; }
  .version-member { font-family: Arial, sans-serif; font-size: 0.75rem; font-weight: bold; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.6rem; padding-bottom: 0.4rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
  .version-lyrics { font-family: Georgia, serif; font-size: 0.88rem; line-height: 1.8; color: #222; white-space: pre-wrap; }
  .line-diff { background: #f0f0f0; border-left: 3px solid #999; padding-left: 4px; display: block; }
  .use-btn { font-family: Arial, sans-serif; font-size: 0.68rem; padding: 0.2rem 0.5rem; border-radius: 2px; border: 1px solid #ccc; background: #fff; color: #666; cursor: pointer; white-space: nowrap; }
  .use-btn:hover { border-color: #000; color: #000; }
  .use-btn.chosen { background: #000; border-color: #000; color: #fff; }

  @media print {
    header, .controls, .member-meta, .song-group-count, .use-btn, .view-toggle { display: none !important; }
    body { font-size: 11pt; }
    main { padding: 0; max-width: 100%; }
    .member-block, .song-group { border: none; page-break-inside: avoid; margin-bottom: 1.5rem; }
    .member-header { background: none; border-bottom: 2px solid #000; padding: 0.4rem 0; }
    .song-group-header { background: none !important; color: #000 !important; border-bottom: 2px solid #000; padding: 0.4rem 0; }
    .versions-grid { grid-template-columns: 1fr !important; }
    .version-col { border-right: none; border-bottom: 1px solid #eee; }
    .song-title, .song-group-title { font-size: 13pt; }
    .song-lyrics, .version-lyrics { font-size: 11pt; line-height: 1.7; }
    .song-block { page-break-inside: avoid; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🎵 Choir Selections Viewer</div>
  <div class="header-right">
    <a href="index.html" class="header-link">← Song Selector</a>
    <button class="btn btn-ghost" onclick="window.print()" style="color:#fff;border-color:#444;background:transparent;font-size:0.75rem;">🖨 Print</button>
  </div>
</header>

<main>
  <div class="controls">
    <span class="date-label">Sunday:</span>
    <div class="date-tabs" id="dateTabs"></div>
    <input type="date" class="date-input" id="customDate">
    <button class="btn btn-black" onclick="goCustomDate()">Go</button>
    <button class="btn btn-ghost" onclick="exportText()">📋 Copy for ProPresenter</button>
    <div class="view-toggle">
      <button class="view-btn active" id="btnMember" onclick="setView('member')">By Member</button>
      <button class="view-btn"        id="btnSong"   onclick="setView('song')">By Song</button>
    </div>
  </div>
  <div id="resultsArea"><div class="state-msg">Loading...</div></div>
</main>

<div id="toast" style="position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#000;border-radius:3px;padding:0.65rem 1.3rem;font-family:Arial,sans-serif;font-size:0.85rem;color:#fff;z-index:600;transition:transform 0.3s ease;white-space:nowrap;"></div>

<script>
var SHEET_ID       = '111kgT6cmIt7JM1pjhl0rMOi1YDNMOI4DwasE2idpkAE';
var SELECTIONS_TAB = 'Selections';
var SHEET_URL      = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=';

var allSelections  = [];
var currentDate    = '';
var currentView    = 'member';
var canonicalSongs = {};

document.addEventListener('DOMContentLoaded', function() { loadAllSelections(); });

function loadAllSelections() {
  fetch(SHEET_URL + encodeURIComponent(SELECTIONS_TAB))
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.text();
    })
    .then(function(text) {
      var json = JSON.parse(text.replace(/^.*?({.*}).*$/s, '$1'));
      if (!json.table || !json.table.rows) {
        document.getElementById('resultsArea').innerHTML = '<div class="state-msg">No submissions yet.</div>';
        return;
      }
      allSelections = json.table.rows
        .filter(function(r) { return r.c && r.c[0] && r.c[0].v; })
        .map(function(r) {
          var cells = r.c.map(function(c) { return (c && c.v) ? String(c.v).trim() : ''; });
          var songs = [];
          for (var i = 3; i < cells.length; i += 2) {
            if (cells[i]) songs.push({ title: cells[i], lyrics: cells[i+1] || '' });
          }
          return { timestamp: cells[0], memberName: cells[1], sunday: cells[2], songs: songs };
        });
      buildDateTabs();
    })
    .catch(function(err) {
      console.error(err);
      document.getElementById('resultsArea').innerHTML = '<div class="state-msg">Could not load selections. Make sure the Google Sheet sharing is set to "Anyone with the link can view".</div>';
    });
}

function buildDateTabs() {
  var seen = {};
  var dates = [];
  allSelections.forEach(function(s) {
    if (s.sunday && !seen[s.sunday]) { seen[s.sunday] = true; dates.push(s.sunday); }
  });
  dates.sort(function(a, b) { return parseDateStr(b) - parseDateStr(a); });

  var tabsEl = document.getElementById('dateTabs');
  if (!dates.length) {
    document.getElementById('resultsArea').innerHTML = '<div class="state-msg">No submissions yet.</div>';
    return;
  }
  tabsEl.innerHTML = dates.map(function(d, i) {
    return '<button class="date-tab' + (i === 0 ? ' active' : '') + '" onclick="selectTab(this, \'' + d.replace(/'/g, "\\'") + '\')">' + escHtml(d) + '</button>';
  }).join('');
  loadForDate(dates[0]);
}

function selectTab(btn, date) {
  document.querySelectorAll('.date-tab').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');
  loadForDate(date);
}

function goCustomDate() {
  var val = document.getElementById('customDate').value;
  if (!val) return;
  loadForDate(val);
}

function loadForDate(dateStr) {
  if (!dateStr) return;
  currentDate    = dateStr;
  canonicalSongs = {};

  var matches = allSelections.filter(function(s) {
    if (!s.sunday) return false;
    if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
      var d   = new Date(dateStr + 'T00:00:00');
      var fmt = d.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
      return s.sunday === fmt || s.sunday === dateStr;
    }
    return s.sunday === dateStr;
  });

  document.querySelectorAll('.date-tab').forEach(function(t) {
    t.classList.toggle('active', t.textContent.trim() === dateStr);
  });

  renderResults(matches, dateStr);
}

function setView(view) {
  currentView = view;
  document.getElementById('btnMember').classList.toggle('active', view === 'member');
  document.getElementById('btnSong').classList.toggle('active', view === 'song');
  loadForDate(currentDate);
}

function renderResults(matches, dateStr) {
  var area = document.getElementById('resultsArea');
  if (!matches.length) {
    area.innerHTML = '<div class="state-msg">No submissions found for ' + escHtml(dateStr) + '.</div>';
    return;
  }
  var allTitles = [];
  var titleSeen = {};
  matches.forEach(function(m) {
    m.songs.forEach(function(s) {
      if (!titleSeen[s.title]) { titleSeen[s.title] = true; allTitles.push(s.title); }
    });
  });
  var summary = '<div class="summary"><span><strong>' + matches.length + '</strong> member' + (matches.length !== 1 ? 's' : '') +
    ' &nbsp;·&nbsp; <strong>' + allTitles.length + '</strong> unique song' + (allTitles.length !== 1 ? 's' : '') +
    ' &nbsp;·&nbsp; ' + escHtml(dateStr) + '</span></div>';
  area.innerHTML = summary + (currentView === 'song' ? renderBySong(matches) : renderByMember(matches));
}

function renderByMember(matches) {
  return matches.map(function(member) {
    var songsHtml = member.songs.map(function(song, i) {
      return (i > 0 ? '<div class="song-divider"></div>' : '') +
        '<div class="song-block"><div class="song-title">' + escHtml(song.title) + '</div>' +
        '<div class="song-lyrics">' + escHtml(song.lyrics) + '</div></div>';
    }).join('');
    return '<div class="member-block"><div class="member-header">' +
      '<span class="member-name">' + escHtml(member.memberName) + '</span>' +
      '<span class="member-meta">Submitted: ' + escHtml(member.timestamp) + '</span>' +
      '</div><div class="member-songs">' + songsHtml + '</div></div>';
  }).join('');
}

function renderBySong(matches) {
  // Group versions by song title
  var songMap = {};
  var songOrder = [];
  matches.forEach(function(member) {
    member.songs.forEach(function(song) {
      var key = song.title.toLowerCase().trim();
      if (!songMap[key]) { songMap[key] = { title: song.title, versions: [] }; songOrder.push(key); }
      songMap[key].versions.push({ member: member.memberName, lyrics: song.lyrics });
    });
  });

  return songOrder.map(function(key) {
    var group   = songMap[key];
    var count   = group.versions.length;
    var colClass = 'c' + Math.min(count, 4);

    // Auto-select first version as canonical
    if (!canonicalSongs[group.title]) canonicalSongs[group.title] = group.versions[0].lyrics;

    var versionsHtml = group.versions.map(function(v, idx) {
      var isChosen  = canonicalSongs[group.title] === v.lyrics;
      var lyricsHtml = count > 1 ? diffLyrics(v.lyrics, group.versions, idx) : escHtml(v.lyrics);
      var useBtn    = count > 1
        ? '<button class="use-btn' + (isChosen ? ' chosen' : '') + '" onclick="setCanonical(\'' +
          key + '\', ' + idx + ', this)">' + (isChosen ? '✓ Using' : 'Use for export') + '</button>'
        : '';
      return '<div class="version-col">' +
        '<div class="version-member"><span>' + escHtml(v.member) + '</span>' + useBtn + '</div>' +
        '<div class="version-lyrics">' + lyricsHtml + '</div></div>';
    }).join('');

    return '<div class="song-group">' +
      '<div class="song-group-header">' +
      '<span class="song-group-title">' + escHtml(group.title) + '</span>' +
      '<span class="song-group-count">' + count + ' version' + (count !== 1 ? 's' : '') + '</span>' +
      '</div><div class="versions-grid ' + colClass + '">' + versionsHtml + '</div></div>';
  }).join('');
}

function diffLyrics(lyrics, allVersions, thisIdx) {
  // Collect all lines from OTHER versions
  var otherLines = {};
  allVersions.forEach(function(v, i) {
    if (i === thisIdx) return;
    v.lyrics.split('\n').forEach(function(l) { otherLines[l.trim().toLowerCase()] = true; });
  });
  return lyrics.split('\n').map(function(line) {
    var t      = line.trim().toLowerCase();
    var isDiff = t !== '' && !otherLines[t];
    return isDiff ? '<span class="line-diff">' + escHtml(line) + '</span>' : escHtml(line);
  }).join('\n');
}

// Store canonical choice per song using the group key
var canonicalIndex = {};
function setCanonical(key, idx, btn) {
  // Find the group
  var matches = allSelections.filter(function(s) { return s.sunday === currentDate; });
  var songMap = {};
  matches.forEach(function(member) {
    member.songs.forEach(function(song) {
      var k = song.title.toLowerCase().trim();
      if (!songMap[k]) songMap[k] = { title: song.title, versions: [] };
      songMap[k].versions.push({ member: member.memberName, lyrics: song.lyrics });
    });
  });
  if (!songMap[key]) return;
  canonicalSongs[songMap[key].title] = songMap[key].versions[idx].lyrics;

  // Update buttons in this group
  var groupEl = btn.closest('.song-group');
  groupEl.querySelectorAll('.use-btn').forEach(function(b) {
    b.classList.remove('chosen');
    b.textContent = 'Use for export';
  });
  btn.classList.add('chosen');
  btn.textContent = '✓ Using';
}

function exportText() {
  var matches = allSelections.filter(function(s) { return s.sunday === currentDate; });
  if (!matches.length) { alert('No selections to export for this date.'); return; }

  var seen  = {};
  var songs = [];
  matches.forEach(function(m) {
    m.songs.forEach(function(s) {
      if (!seen[s.title.toLowerCase()]) {
        seen[s.title.toLowerCase()] = true;
        songs.push({ title: s.title, lyrics: canonicalSongs[s.title] || s.lyrics });
      }
    });
  });

  var sep  = '='.repeat(50);
  var text = 'CHOIR SELECTIONS — ' + currentDate + '\n' + sep + '\n\n';
  songs.forEach(function(song, i) {
    text += '[' + song.title.toUpperCase() + ']\n' + '-'.repeat(40) + '\n' + song.lyrics;
    if (i < songs.length - 1) text += '\n\n' + sep + '\n\n';
  });

  navigator.clipboard.writeText(text).then(function() {
    showToast('Copied to clipboard — ready to paste into ProPresenter');
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:10%;left:10%;width:80%;height:70%;z-index:9999;font-family:monospace;font-size:0.85rem;padding:1rem;border:2px solid #000;border-radius:4px;';
    document.body.appendChild(ta);
    ta.select();
    var close = document.createElement('button');
    close.textContent = 'X Close';
    close.style.cssText = 'position:fixed;top:calc(10% - 2.5rem);left:10%;z-index:9999;background:#000;color:#fff;border:none;padding:0.4rem 0.8rem;border-radius:3px;cursor:pointer;font-family:Arial,sans-serif;';
    close.onclick = function() { document.body.removeChild(ta); document.body.removeChild(close); };
    document.body.appendChild(close);
    showToast('Select all and copy (Ctrl+A, Ctrl+C)');
  });
}

function parseDateStr(str) { var d = new Date(str); return isNaN(d) ? 0 : d.getTime(); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.style.transform = 'translateX(-50%) translateY(80px)'; }, 3500);
}
</script>
</body>
</html>
